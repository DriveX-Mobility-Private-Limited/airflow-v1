# Production values for Airflow Helm Chart
# Usage: helm upgrade --install airflow . -f values.yaml -f values-prod.yaml
---

# Ingress configuration for production
ingress:
  apiServer:
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
    hosts:
      - name: "airflow.drivex.in"
        tls:
          enabled: true
          secretName: "airflow-prod-tls-cert"

# Production S3 logging path
extraEnv: |
  - name: _PIP_ADDITIONAL_REQUIREMENTS
    value: "apache-airflow-providers-airbyte apache-airflow-providers-amazon"
  - name: AIRFLOW__LOGGING__REMOTE_LOGGING
    value: "True"
  - name: AIRFLOW__LOGGING__REMOTE_BASE_LOG_FOLDER
    value: "s3://datalake-central-hub/airflow/prod/logs"
  - name: AIRFLOW__LOGGING__REMOTE_LOG_CONN_ID
    value: "aws_default"
  - name: AIRFLOW__CORE__TEST_CONNECTION
    value: "Enabled"

# Git sync pointing to main branch for production
dags:
  persistence:
    enabled: false
    storageClassName: "gp2"
  gitSync:
    enabled: true
    repo: https://github.com/DriveX-Mobility-Private-Limited/airflow-v1.git
    branch: main
    ref: main
    subPath: "dags"

# Worker persistence
workers:
  persistence:
    enabled: true
    size: 50Gi
    storageClassName: "gp2"

# Triggerer persistence
triggerer:
  persistence:
    enabled: true
    size: 50Gi
    storageClassName: "gp2"

# Logs persistence (disabled - using S3 remote logging)
logs:
  persistence:
    enabled: false
    storageClassName: "gp2"
