########################################################
## Airflow Create Stable Secrets Job (ArgoCD PreSync)
## Creates apiSecretKey and jwtSecret once if not present.
## Runs as an ArgoCD PreSync hook — skipped on plain Helm.
########################################################
{{- if and (semverCompare ">=3.0.0" .Values.airflowVersion) .Values.apiServer.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "airflow.fullname" . }}-create-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    tier: airflow
    component: create-secrets-job
    release: {{ .Release.Name }}
    chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    heritage: {{ .Release.Service }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "airflow.fullname" . }}-create-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    tier: airflow
    component: create-secrets-job
    release: {{ .Release.Name }}
    chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    heritage: {{ .Release.Service }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "airflow.fullname" . }}-create-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    tier: airflow
    component: create-secrets-job
    release: {{ .Release.Name }}
    chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    heritage: {{ .Release.Service }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "airflow.fullname" . }}-create-secrets
subjects:
  - kind: ServiceAccount
    name: {{ include "airflow.fullname" . }}-create-secrets
    namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "airflow.fullname" . }}-create-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    tier: airflow
    component: create-secrets-job
    release: {{ .Release.Name }}
    chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    heritage: {{ .Release.Service }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        tier: airflow
        component: create-secrets-job
        release: {{ .Release.Name }}
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "airflow.fullname" . }}-create-secrets
      containers:
        - name: create-secrets
          image: bitnami/kubectl:latest
          command:
            - /bin/sh
            - -c
            - |
              # Create api-secret-key only if it does not already exist
              if kubectl get secret {{ .Values.apiSecretKeySecretName | default (printf "%s-api-secret-key" (include "airflow.fullname" .)) }} -n {{ .Release.Namespace }} > /dev/null 2>&1; then
                echo "api-secret-key already exists, skipping"
              else
                echo "Creating api-secret-key..."
                kubectl create secret generic {{ .Values.apiSecretKeySecretName | default (printf "%s-api-secret-key" (include "airflow.fullname" .)) }} \
                  --from-literal=api-secret-key="$(cat /dev/urandom | tr -dc 'a-zA-Z0-9' | head -c 32)" \
                  -n {{ .Release.Namespace }}
              fi

              # Create jwt-secret only if it does not already exist
              if kubectl get secret {{ .Values.jwtSecretName | default (printf "%s-jwt-secret" (include "airflow.fullname" .)) }} -n {{ .Release.Namespace }} > /dev/null 2>&1; then
                echo "jwt-secret already exists, skipping"
              else
                echo "Creating jwt-secret..."
                kubectl create secret generic {{ .Values.jwtSecretName | default (printf "%s-jwt-secret" (include "airflow.fullname" .)) }} \
                  --from-literal=jwt-secret="$(cat /dev/urandom | tr -dc 'a-zA-Z0-9' | head -c 32)" \
                  -n {{ .Release.Namespace }}
              fi
{{- end }}
